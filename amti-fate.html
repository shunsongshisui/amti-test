<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMTI · 天命测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap');

        :root {
            --bg: #080612;
            --card: #120e20;
            --border: #2a2044;
            --gold: #b89ce0;
            --gold-dim: #7a64a0;
            --cream: #e2d4f5;
            --glow: rgba(142,110,204,0.15);
        }

        body {
            background: var(--bg);
            color: var(--cream);
            font-family: 'Noto Serif SC', 'SimSun', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 30% 40%, rgba(142,110,204,0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 70%, rgba(60,40,100,0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container { position: relative; z-index: 1; width: 100%; max-width: 680px; padding: 20px; }

        .panel {
            background: var(--card); border: 1px solid var(--border); border-radius: 16px;
            padding: 40px 36px; box-shadow: 0 8px 40px rgba(0,0,0,0.6);
            transition: all 0.3s; position: relative; overflow: hidden; min-height: 460px;
        }

        .panel::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0;
            height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0.35;
        }

        .panel-header { text-align: center; margin-bottom: 32px; }

        .fate-icon { font-size: 42px; margin-bottom: 6px; }
        #start-screen .logo {
            font-size: 52px; font-weight: 900; letter-spacing: 8px;
            background: linear-gradient(180deg, var(--cream) 0%, var(--gold) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            line-height: 1.2;
        }
        #start-screen .logo-sub { font-size: 13px; letter-spacing: 8px; color: var(--gold-dim); margin-top: 6px; font-weight: 400; }
        #start-screen .subtitle { margin-top: 24px; font-size: 16px; color: var(--cream); opacity: 0.8; line-height: 1.8; }

        .fate-badge {
            display: inline-block; padding: 4px 16px;
            border: 1px solid var(--gold-dim); border-radius: 20px;
            font-size: 12px; letter-spacing: 3px; color: var(--gold-dim);
            margin-bottom: 16px;
        }

        .btn {
            display: inline-block; padding: 14px 48px;
            border: 1px solid var(--gold); background: transparent;
            color: var(--gold); font-family: inherit; font-size: 16px;
            letter-spacing: 3px; cursor: pointer; border-radius: 4px;
            transition: all 0.3s; margin-top: 24px;
        }
        .btn:hover { background: var(--gold); color: var(--bg); box-shadow: 0 0 30px var(--glow); }
        .btn:active { transform: scale(0.97); }

        #quiz-screen { display: none; }
        .progress-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
        .progress-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--gold); transition: width 0.5s ease; border-radius: 2px; }
        .progress-text { font-size: 13px; color: var(--gold-dim); white-space: nowrap; min-width: 48px; text-align: right; }
        .question-tag { font-size: 12px; color: var(--gold-dim); letter-spacing: 2px; margin-bottom: 8px; }
        .question-text { font-size: 19px; font-weight: 700; line-height: 1.7; margin-bottom: 28px; min-height: 56px; }

        .options { display: flex; flex-direction: column; gap: 10px; }
        .option {
            padding: 14px 18px; border: 1px solid var(--border); border-radius: 8px;
            cursor: pointer; transition: all 0.25s; font-size: 15px;
            line-height: 1.5; background: rgba(255,255,255,0.02); text-align: center;
        }
        .option:hover { border-color: var(--gold-dim); background: rgba(142,110,204,0.06); }
        .option.selected { border-color: var(--gold); background: rgba(142,110,204,0.1); box-shadow: 0 0 20px var(--glow); }
        .option .option-label {
            display: inline-block; width: 22px; height: 22px; line-height: 20px;
            text-align: center; border: 1px solid var(--border); border-radius: 50%;
            font-size: 12px; margin-right: 10px; transition: all 0.25s; flex-shrink: 0;
        }
        .option.selected .option-label { border-color: var(--gold); background: var(--gold); color: var(--bg); }
        .option-content { display: flex; align-items: center; justify-content: center; }

        .nav-buttons { display: flex; justify-content: space-between; margin-top: 28px; gap: 12px; }
        .btn-small {
            padding: 10px 28px; border: 1px solid var(--border); background: transparent;
            color: var(--cream); font-family: inherit; font-size: 14px;
            cursor: pointer; border-radius: 4px; transition: all 0.25s;
        }
        .btn-small:hover { border-color: var(--gold-dim); color: var(--gold); }
        .btn-small:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-small.primary { border-color: var(--gold); color: var(--gold); }
        .btn-small.primary:hover { background: var(--gold); color: var(--bg); }
        .btn-small.submit { background: var(--gold); color: var(--bg); border-color: var(--gold); letter-spacing: 2px; }
        .btn-small.submit:hover { box-shadow: 0 0 25px var(--glow); }

        #result-screen { display: none; }
        .result-loading { text-align: center; padding: 60px 0; }
        .result-loading .spinner-text { font-size: 14px; color: var(--gold-dim); margin-top: 16px; letter-spacing: 2px; animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        .result-content { display: none; }
        .result-header { text-align: center; margin-bottom: 14px; }

        .fate-result-badge {
            display: inline-block; padding: 4px 20px;
            border: 1px solid var(--gold-dim); border-radius: 20px;
            font-size: 11px; letter-spacing: 4px; color: var(--gold-dim); margin-bottom: 12px;
        }

        .result-type { font-size: 32px; font-weight: 900; color: var(--gold); letter-spacing: 4px; text-shadow: 0 0 30px rgba(142,110,204,0.2); }
        .result-code { display: inline-block; font-size: 16px; font-weight: 700; letter-spacing: 4px; padding: 3px 14px; border: 1px solid var(--gold-dim); border-radius: 4px; color: var(--gold-dim); background: rgba(142,110,204,0.05); margin-top: 6px; }

        .fate-line { margin: 16px 0; font-size: 13px; color: var(--gold-dim); letter-spacing: 2px; text-align: center; }
        .fate-line span { display: inline-block; animation: fadeIn 2s ease; }
        @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }

        .result-quote { font-style: italic; font-size: 15px; color: var(--cream); opacity: 0.75; text-align: center; margin-bottom: 20px; line-height: 1.7; }
        .result-quote::before { content: '\201C'; }
        .result-quote::after { content: '\201D'; }

        .result-desc { font-size: 14px; line-height: 1.9; color: var(--cream); opacity: 0.85; margin-bottom: 18px; text-align: justify; }

        .result-details { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
        .detail-card {
            border: 1px solid var(--border); border-radius: 8px;
            padding: 12px 16px; background: rgba(255,255,255,0.02);
        }
        .detail-card-title { font-size: 11px; letter-spacing: 2px; color: var(--gold-dim); margin-bottom: 5px; }
        .detail-card ul { list-style: none; padding: 0; }
        .detail-card li { font-size: 13px; line-height: 1.6; padding: 2px 0; padding-left: 12px; position: relative; }
        .detail-card li::before { content: '\2022'; position: absolute; left: 0; color: var(--gold-dim); }
        .detail-tag-wrap { display: flex; gap: 6px; flex-wrap: wrap; }
        .detail-tag { font-size: 11px; padding: 2px 10px; border: 1px solid var(--border); border-radius: 12px; color: var(--cream); opacity: 0.65; }

        .result-stats { margin-bottom: 20px; }
        .stat-item { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
        .stat-name { font-size: 10px; min-width: 64px; text-align: right; color: var(--cream); opacity: 0.6; flex-shrink: 0; }
        .stat-bar { flex: 1; height: 3px; background: rgba(255,255,255,0.04); border-radius: 2px; overflow: hidden; }
        .stat-fill { height: 100%; border-radius: 2px; transition: width 1s ease; width: 0%; background: linear-gradient(90deg, var(--gold-dim), var(--gold)); }
        .stat-fill.top { background: linear-gradient(90deg, var(--gold), #d4b8f0); box-shadow: 0 0 10px rgba(142,110,204,0.3); }
        .stat-pct { font-size: 10px; min-width: 24px; color: var(--gold-dim); text-align: right; }

        .result-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .result-actions .btn-small { min-width: 120px; }

        .glint { position: absolute; width: 3px; height: 3px; border-radius: 50%; opacity: 0; pointer-events: none; animation: glint-fade 4s ease-in-out infinite; }
        .glint.g1 { background: var(--gold); }
        .glint.g2 { background: #7a64a0; }
        @keyframes glint-fade { 0%, 100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 0.35; transform: scale(1); } }

        @media (max-width: 600px) {
            .panel { padding: 28px 20px; }
            #start-screen .logo { font-size: 36px; letter-spacing: 4px; }
            .question-text { font-size: 17px; }
            .option { font-size: 14px; padding: 12px 14px; }
            .result-type { font-size: 26px; }
            .btn { padding: 12px 32px; font-size: 14px; }
            .stat-name { min-width: 48px; font-size: 9px; }
        }
        @media (max-width: 400px) {
            .panel { padding: 20px 14px; border-radius: 12px; }
            #start-screen .logo { font-size: 28px; }
            .option { font-size: 13px; padding: 10px 12px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="panel" id="panel">
        <div class="glint g1" style="top:10%;left:6%;animation-delay:0s;"></div>
        <div class="glint g2" style="top:28%;right:10%;animation-delay:1.2s;"></div>
        <div class="glint g1" style="bottom:35%;left:12%;animation-delay:2.5s;"></div>
        <div class="glint g2" style="top:65%;right:8%;animation-delay:0.8s;"></div>
        <div class="glint g1" style="top:82%;left:4%;animation-delay:1.8s;"></div>
        <div class="glint g2" style="bottom:8%;right:18%;animation-delay:3s;"></div>

        <!-- ========== 开始页 ========== -->
        <div id="start-screen">
            <div class="panel-header">
                <div class="fate-icon">🔮</div>
                <div class="logo">AMTI</div>
                <div class="logo-sub">天 · 命 · 测 · 试</div>
                <div class="fate-badge" style="margin-top:12px;">全凭天意 · 无需选择</div>
            </div>
            <div style="text-align:center;">
                <div class="subtitle">
                    所有题目的选项完全一样。<br>
                    你的命运已经被写在星盘上了——<br>
                    你选的不是答案，是时机。
                </div>
                <button class="btn" onclick="startQuiz()">开始测试</button>
            </div>
        </div>

        <!-- ========== 测试页 ========== -->
        <div id="quiz-screen">
            <div class="progress-wrap">
                <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
                <span class="progress-text" id="progress-text">1/18</span>
            </div>
            <div class="question-tag" id="question-tag">· 天命 ·</div>
            <div class="question-text" id="question-text"></div>
            <div class="options" id="options-container"></div>
            <div class="nav-buttons">
                <button class="btn-small" id="prev-btn" onclick="prevQuestion()" style="display:none;">← 上一题</button>
                <button class="btn-small primary" id="next-btn" onclick="nextQuestion()">下一题 →</button>
                <button class="btn-small submit" id="submit-btn" onclick="submitQuiz()" style="display:none;">查看命运</button>
            </div>
        </div>

        <!-- ========== 结果页 ========== -->
        <div id="result-screen">
            <div class="result-loading" id="result-loading">
                <div style="font-size:40px;animation: pulse 1s infinite;">🔮</div>
                <div class="spinner-text">星盘正在排列中...</div>
            </div>
            <div class="result-content" id="result-content">
                <div class="result-header">
                    <div class="fate-result-badge">✦ 天命所归 ✦</div>
                    <div class="result-type" id="result-type"></div>
                    <div class="result-code" id="result-code"></div>
                </div>
                <div class="fate-line"><span>━━━ 命运选择了你 ━━━</span></div>
                <div class="result-quote" id="result-quote"></div>
                <div class="result-desc" id="result-desc"></div>
                <div class="result-details" id="result-details"></div>
                <div class="result-stats" id="result-stats"></div>
                <div class="result-actions">
                    <button class="btn-small" onclick="restartQuiz()">再测一次</button>
                    <button class="btn-small primary" onclick="window.location.href='index.html'">→ 去答题版</button>
                </div>
            </div>
        </div>
    </div>
    <div style="text-align:center;margin-top:12px;font-size:11px;color:var(--border);letter-spacing:1px;">
        献给诡秘之主 · Memories老师
    </div>
</div>

<script>
// ============================================================
//  十八种阿蒙人格（同主测试）
// ============================================================
const TYPES = [
    { id:'primeval', name:'本体蒙', code:'PRMA', quote:'我就是规则。', desc:'你是所有阿蒙的源头，最纯粹也最强大。你不需要玩弄诡计，因为你本身就是规则的制定者。居高临下，俯瞰众生——你的存在本身就是最大的欺骗。',
      strengths:['天生的统治力，无需动手即令人臣服','对全局的绝对掌控感','不怒自威的存在感'],
      weaknesses:['缺乏灵活变通，一旦失控容易崩盘','不屑于小手段，反而容易被小手段绊倒','过于自负，难以接受失败'],
      method:'本体蒙从不主动欺骗。它的欺骗在于「存在」——当所有人都以为它是一盘棋的棋手时，它其实是整张棋盘本身。',
      vibe:'君临天下 · 神性漠然' },
    { id:'monocle', name:'单片眼镜蒙', code:'LENS', quote:'你看到的，只是我想让你看到的。', desc:'你优雅、从容、一切尽在掌握。单片眼镜是你的标志，洞察一切表象背后的真实。你从不急躁，因为每一步都已经算好。',
      strengths:['精密的计划能力和极致的耐心','洞察力极强，能看穿一切伪装','优雅从容，危机中亦不慌乱'],
      weaknesses:['计划越精密，越难应对真正的意外','容易过度自信于自己的判断力','对不可控因素容忍度低'],
      method:'LENS型欺骗是「信息差」的艺术。它不制造谎言，而是巧妙地选择展示哪些真相，让猎物自己推导出错误的结论。',
      vibe:'绅士诡计 · 算无遗策' },
    { id:'bell', name:'敲钟蒙', code:'PEAL', quote:'时候到了。', desc:'你热爱戏剧性的登场，在关键时刻敲响命运的钟声。你不在意过程多长，只要结局足够精彩。每一次出场都是一场表演。',
      strengths:['无与伦比的时机把握能力','天生的表演者和气氛制造者','能在最关键的一刻扭转局势'],
      weaknesses:['过度追求戏剧性，有时会为了效果而冒险','无法忍受平淡，容易主动制造事端','容易被更会演的人反将一军'],
      method:'PEAL型的核心是「节奏控制」。它把人生当成一部剧本，通过精心选择出场时机，让每个人都以为自己是主角——但实际上，它才是那个敲响幕布的导演。',
      vibe:'命运之钟 · 登场即高潮' },
    { id:'messenger', name:'信使蒙', code:'HERL', quote:'消息就是力量。', desc:'你游走于各方势力之间，传递信息也窃取秘密。你是情报的枢纽，知道谁需要什么、谁知道什么。',
      strengths:['超强的社交和信息网络','能在信息流动中获取最大利益','各方势力都需要的不可替代之人'],
      weaknesses:['容易被信息过载压垮','在多方之间周旋容易引火烧身','一旦失去消息来源，价值急剧下降'],
      method:'HERL型欺骗的基础是「信息不对称」。它不捏造信息，而是控制信息的流向——让该知道的人知道，不该知道的人永远蒙在鼓里。',
      vibe:'阴影线人 · 知天下事' },
    { id:'parasite', name:'寄生蒙', code:'NEST', quote:'你是我最好的朋友，对吗？', desc:'你善于潜伏和寄生，借他人之手达成自己的目的。你不喜欢正面冲突，更享受在暗处操控一切的感觉。',
      strengths:['极强的伪装和潜伏能力','善用他人力量，四两拨千斤','几乎不留痕迹的操控手段'],
      weaknesses:['长期寄生会形成依赖，失去独立行动力','一旦被宿主识破，反噬极为猛烈','真实人格容易被寄生身份淹没'],
      method:'NEST型的精髓在于「温水煮蛙」。它从不突然发难，而是一点点渗透进目标的信任圈，让目标习惯了它的存在——直到某天，目标发现自己已经分不清哪些是自己想的，哪些是它植入的。',
      vibe:'暗处织网 · 借手杀人' },
    { id:'worm', name:'时之虫蒙', code:'WARP', quote:'时间？那只是个概念。', desc:'你游走于时间的缝隙中，神秘莫测，无处不在。过去、现在、未来对你来说不过是不同的坐标。',
      strengths:['不可预测性——你最大的武器','能在不同时间尺度上思考和行动','几乎不可能被追踪或困住'],
      weaknesses:['不可预测也意味着不可靠','容易在时间的缝隙中迷失自我','难以建立稳定的关系和信任'],
      method:'WARP型的欺骗超越了语言和谎言——它利用的是「先后顺序」。它让你以为事情发生的顺序是A→B→C，但实际上它早就去过C了，然后回到A等待。',
      vibe:'虫洞漫步 · 时序错乱' },
    { id:'trickster', name:'愚弄蒙', code:'HOAX', quote:'你相信我说的话？', desc:'你以愚弄他人为乐，深谙人性的弱点。真话和假话在你嘴里毫无区别，只要能达到目的。',
      strengths:['天生的谎言大师，真假难辨','深谙人性弱点，精准打击','在混乱中总能全身而退'],
      weaknesses:['最高兴时往往是自己也信了假的','过度玩弄他人最终会失去所有信任','纯粹为乐趣而欺骗，缺乏长远目标'],
      method:'HOAX型是「纯粹欺骗」的化身。它的谎言不是为了利益、权力或生存——它骗人，只是因为骗人有趣。',
      vibe:'谎言盛宴 · 真假莫辨' },
    { id:'thief', name:'盗贼蒙', code:'HEIST', quote:'现在它是我的了。', desc:'你想要什么，就直接拿走。不玩复杂的诡计，不搞冗长的布局——偷窃本身就是一种艺术。',
      strengths:['行动力极强，目标明确','干净利落，不拖泥带水','能快速评估目标价值，从不错过好机会'],
      weaknesses:['短视，容易被眼前的利益诱惑','树敌多，因为大家都少了东西','偷窃的快感阈值越来越高，永不满足'],
      method:'HEIST型不屑于复杂的骗局。它的方式简单直接——看上了，就拿走。但它的「偷」不限于实物。它偷机会、偷时间、偷别人的潜在可能性。',
      vibe:'来去如风 · 雁过拔毛' },
    { id:'dream', name:'窃梦蒙', code:'DREM', quote:'你确定这是你的记忆？', desc:'你游走于现实与虚幻的边界，偷窃梦境与记忆。对你来说，真实不过是一层可以被改写的外衣。',
      strengths:['能在潜意识层面操控他人','偷取记忆是最彻底的窃取','能植入虚假记忆，重塑一个人的认知'],
      weaknesses:['长期游走于梦境与现实之间，容易分不清边界','自身的记忆也可能被梦境侵蚀','入梦越深，醒来越难'],
      method:'DREM型攻击的是「现实的地基」。它不改变物质世界，而是改写你对世界的认知。',
      vibe:'梦境窃贼 · 记忆泥瓦匠' },

// ============================================================
//  天命题库 — 所有选项完全一样，每题对应4种不同阿蒙
//  18题 ÷ 18种 = 每种出现4次
// ============================================================
const QUESTIONS = [
    { text: '你推开一扇门，门后是一条无尽的走廊。你做的第一件事是——', opts: ['primeval','monocle','bell','messenger'] },
    { text: '你收到一封没有署名的信。信封上只写了你的名字。你会——', opts: ['parasite','worm','trickster','thief'] },
    { text: '黄昏时分，你在集市上看到了一个卖旧怀表的小贩。你会——', opts: ['dream','thousand','fate','mirror'] },
    { text: '你在梦中反复见到同一个陌生的房间。醒来后你——', opts: ['interesting','observer','duke','fishing'] },
    { text: '有人在你耳边说了一句你听不懂的话。你的反应是——', opts: ['didi','divine','primeval','monocle'] },
    { text: '你面前有两条分岔路。没有路牌，没有脚印。你——', opts: ['bell','messenger','parasite','worm'] },
    { text: '你在旧书摊上翻到一本没有作者的书。翻开第一页——', opts: ['trickster','thief','dream','thousand'] },
    { text: '一场大雾突然笼罩了整座城市。你选择——', opts: ['fate','mirror','interesting','observer'] },
    { text: '你捡到一面古老的铜镜，镜面里的人朝你笑了一下。你——', opts: ['duke','fishing','didi','divine'] },
    { text: '有人向你提出了一个交易——用你的一段记忆换一个答案。你——', opts: ['primeval','monocle','bell','messenger'] },
    { text: '你发现自从上周开始，所有人的表都慢了五分钟。你——', opts: ['parasite','worm','trickster','thief'] },
    { text: '你站在一座大钟下面，指针在倒着走。你——', opts: ['dream','thousand','fate','mirror'] },
    { text: '有人在人群中叫了一个你已经很久没用过的名字。你——', opts: ['interesting','observer','duke','fishing'] },
    { text: '你的影子在正午时分，擅自朝另一个方向走去。你——', opts: ['didi','divine','primeval','monocle'] },
    { text: '你发现口袋里多了一张纸条，上面写着明天的天气。你——', opts: ['bell','messenger','parasite','worm'] },
    { text: '你在荒漠里看到了一座不属于任何地图的废墟。你——', opts: ['trickster','thief','dream','thousand'] },
    { text: '你做了一个梦中梦——醒来之后，不确定自己真的醒了。你——', opts: ['fate','mirror','interesting','observer'] },
    { text: '你来到了路的尽头。没有墙，没有门——只有一层薄雾。你——', opts: ['duke','fishing','didi','divine'] },
];

const OPTION_TEXTS = ['就是它了。','就是它了。','就是它了。','就是它了。'];

// ============================================================
//  状态
// ============================================================
let currentQ = 0;
let answers = new Array(QUESTIONS.length).fill(null);

function startQuiz() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    renderQuestion();
}

function restartQuiz() {
    currentQ = 0;
    answers = new Array(QUESTIONS.length).fill(null);
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    renderQuestion();
}

function renderQuestion() {
    const total = QUESTIONS.length;
    document.getElementById('progress-fill').style.width = ((currentQ + 1) / total * 100) + '%';
    document.getElementById('progress-text').textContent = `${currentQ + 1}/${total}`;
    document.getElementById('question-tag').textContent = `· 天命 第 ${currentQ + 1} 问 ·`;
    document.getElementById('question-text').textContent = QUESTIONS[currentQ].text;

    const container = document.getElementById('options-container');
    container.innerHTML = '';
    const labels = ['A', 'B', 'C', 'D'];

    OPTION_TEXTS.forEach((text, idx) => {
        const div = document.createElement('div');
        div.className = 'option' + (answers[currentQ] === idx ? ' selected' : '');
        div.innerHTML = `<div class="option-content"><span class="option-label">${labels[idx]}</span>${text}</div>`;
        div.addEventListener('click', () => selectOption(idx));
        container.appendChild(div);
    });

    document.getElementById('prev-btn').style.display = currentQ === 0 ? 'none' : 'inline-block';
    const nextBtn = document.getElementById('next-btn');
    const submitBtn = document.getElementById('submit-btn');
    if (currentQ === total - 1) {
        nextBtn.style.display = 'none';
        submitBtn.style.display = 'inline-block';
    } else {
        nextBtn.style.display = 'inline-block';
        submitBtn.style.display = 'none';
    }
    const hasAnswer = answers[currentQ] !== null;
    nextBtn.disabled = !hasAnswer;
    submitBtn.disabled = !hasAnswer;
}

function selectOption(idx) {
    answers[currentQ] = idx;
    const options = document.getElementById('options-container').children;
    for (let i = 0; i < options.length; i++) options[i].classList.toggle('selected', i === idx);
    document.getElementById('next-btn').disabled = false;
    document.getElementById('submit-btn').disabled = false;
}

function nextQuestion() {
    if (answers[currentQ] === null) return;
    if (currentQ < QUESTIONS.length - 1) { currentQ++; renderQuestion(); }
}

function prevQuestion() {
    if (currentQ > 0) { currentQ--; renderQuestion(); }
}

function submitQuiz() {
    if (answers.some(a => a === null)) return;
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('result-loading').style.display = 'block';
    document.getElementById('result-content').style.display = 'none';
    setTimeout(() => { const r = calculateResult(); showResult(r); }, 1500);
}

function calculateResult() {
    const scores = {};
    TYPES.forEach(t => scores[t.id] = 0);
    QUESTIONS.forEach((q, qi) => {
        const chosen = answers[qi];
        if (chosen === null) return;
        const typeId = q.opts[chosen];
        scores[typeId] = (scores[typeId] || 0) + 1;
    });
    const sorted = Object.entries(scores).map(([id, count]) => ({ id, count })).sort((a, b) => b.count - a.count);
    const top = sorted[0].id;
    const total = answers.length;
    const stats = sorted.map(s => ({ ...s, pct: Math.round((s.count / total) * 100) }));
    return { top, stats };
}

function showResult(result) {
    document.getElementById('result-loading').style.display = 'none';
    document.getElementById('result-content').style.display = 'block';

    const type = TYPES.find(t => t.id === result.top);
    document.getElementById('result-type').textContent = type.name;
    document.getElementById('result-code').textContent = type.code;
    document.getElementById('result-quote').textContent = type.quote;
    document.getElementById('result-desc').textContent = type.desc;

    const detailsEl = document.getElementById('result-details');
    detailsEl.innerHTML = `
        <div class="detail-card">
            <div class="detail-card-title">▎欺骗之道</div>
            <div style="font-size:13px;line-height:1.8;color:var(--cream);opacity:0.85;">${type.method}</div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <div class="detail-card" style="flex:1;min-width:140px;">
                <div class="detail-card-title">▎优势</div>
                <ul>${type.strengths.map(s => `<li>${s}</li>`).join('')}</ul>
            </div>
            <div class="detail-card" style="flex:1;min-width:140px;">
                <div class="detail-card-title">▎弱点</div>
                <ul>${type.weaknesses.map(s => `<li>${s}</li>`).join('')}</ul>
            </div>
        </div>
        <div class="detail-card">
            <div class="detail-card-title">▎气质标签</div>
            <div class="detail-tag-wrap">
                ${type.vibe.split('·').map(s => `<span class="detail-tag">${s.trim()}</span>`).join('')}
                <span class="detail-tag">代号 ${type.code}</span>
            </div>
        </div>
    `;

    const statsEl = document.getElementById('result-stats');
    statsEl.innerHTML = '<div class="detail-card-title" style="margin-bottom:6px;">▎天命排行</div>';
    const maxCount = Math.max(...result.stats.map(s => s.count));
    result.stats.forEach(s => {
        const t = TYPES.find(t => t.id === s.id);
        if (!t) return;
        const isTop = s.id === result.top;
        const rw = maxCount > 0 ? (s.count / maxCount) * 100 : 0;
        const item = document.createElement('div');
        item.className = 'stat-item';
        item.innerHTML = `<span class="stat-name">${t.name}</span><div class="stat-bar"><div class="stat-fill${isTop ? ' top' : ''}" style="width:${rw}%;"></div></div><span class="stat-pct">${s.pct}%</span>`;
        statsEl.appendChild(item);
    });

    document.getElementById('panel').scrollIntoView({ behavior: 'smooth' });
}
</script>
