<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMTI · 阿蒙人格测试</title>
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap');

        :root {
            --bg: #0a0a0f;
            --card: #14141e;
            --border: #2a2a3e;
            --gold: #c9a84c;
            --gold-dim: #8a7230;
            --cream: #f5e6c8;
            --glow: rgba(201,168,76,0.15);
            --purple: #b89ce0;
            --purple-dim: #7a64a0;
            --purple-glow: rgba(142,110,204,0.15);
        }

        body {
            background: var(--bg);
            color: var(--cream);
            font-family: 'Noto Serif SC', 'SimSun', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 40%, rgba(201,168,76,0.03) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 60%, rgba(142,110,204,0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container { position: relative; z-index: 1; width: 100%; max-width: 680px; padding: 20px; }

        .panel {
            background: var(--card); border: 1px solid var(--border); border-radius: 16px;
            padding: 48px 36px; box-shadow: 0 8px 40px rgba(0,0,0,0.6);
            position: relative; overflow: hidden;
        }
        .panel::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0;
            height: 2px; background: linear-gradient(90deg, transparent, var(--gold), var(--purple), transparent); opacity: 0.4;
        }

        .glint { position: absolute; width: 3px; height: 3px; border-radius: 50%; opacity: 0; pointer-events: none; animation: glint-fade 4s ease-in-out infinite; }
        .glint.g1 { background: var(--gold); }
        .glint.g2 { background: var(--purple); }
        @keyframes glint-fade { 0%, 100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 0.35; transform: scale(1); } }

        .header { text-align: center; margin-bottom: 36px; }
        .icon-row { font-size: 36px; letter-spacing: 8px; margin-bottom: 8px; }
        .logo {
            font-size: 52px; font-weight: 900; letter-spacing: 8px;
            background: linear-gradient(135deg, var(--cream) 0%, var(--gold) 40%, var(--purple) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            line-height: 1.2;
        }
        .logo-sub { font-size: 13px; letter-spacing: 8px; color: var(--gold-dim); margin-top: 6px; font-weight: 400; }
        .desc { margin-top: 20px; font-size: 15px; color: var(--cream); opacity: 0.7; line-height: 1.8; text-align: center; }

        .card-row {
            display: flex; gap: 16px; margin-bottom: 20px;
        }

        .card {
            flex: 1; border: 1px solid var(--border); border-radius: 12px;
            padding: 28px 20px; text-align: center; cursor: pointer;
            transition: all 0.35s; text-decoration: none; color: var(--cream);
            background: rgba(255,255,255,0.01); position: relative; overflow: hidden;
        }
        .card::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0;
            height: 2px; opacity: 0; transition: opacity 0.35s;
        }
        .card:hover { transform: translateY(-4px); }
        .card:active { transform: translateY(-1px); }

        .card-gold { border-color: rgba(201,168,76,0.2); }
        .card-gold::after { background: linear-gradient(90deg, transparent, var(--gold), transparent); }
        .card-gold:hover { border-color: rgba(201,168,76,0.4); box-shadow: 0 8px 30px rgba(201,168,76,0.08); }
        .card-gold:hover::after { opacity: 1; }
        .card-gold .card-icon { font-size: 32px; margin-bottom: 12px; }
        .card-gold .card-title { font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: 3px; margin-bottom: 8px; }
        .card-gold .card-sub { font-size: 13px; color: var(--gold-dim); letter-spacing: 2px; margin-bottom: 12px; }
        .card-gold .card-desc { font-size: 13px; color: var(--cream); opacity: 0.6; line-height: 1.7; }

        .card-purple { border-color: rgba(142,110,204,0.2); }
        .card-purple::after { background: linear-gradient(90deg, transparent, var(--purple), transparent); }
        .card-purple:hover { border-color: rgba(142,110,204,0.4); box-shadow: 0 8px 30px rgba(142,110,204,0.08); }
        .card-purple:hover::after { opacity: 1; }
        .card-purple .card-icon { font-size: 32px; margin-bottom: 12px; }
        .card-purple .card-title { font-size: 22px; font-weight: 700; color: var(--purple); letter-spacing: 3px; margin-bottom: 8px; }
        .card-purple .card-sub { font-size: 13px; color: var(--purple-dim); letter-spacing: 2px; margin-bottom: 12px; }
        .card-purple .card-desc { font-size: 13px; color: var(--cream); opacity: 0.6; line-height: 1.7; }

        .card-badge {
            display: inline-block; font-size: 10px; letter-spacing: 2px;
            padding: 2px 10px; border-radius: 10px; margin-bottom: 10px;
        }
        .card-gold .card-badge { border: 1px solid var(--gold-dim); color: var(--gold-dim); }
        .card-purple .card-badge { border: 1px solid var(--purple-dim); color: var(--purple-dim); }

        .footer-text {
            text-align: center; font-size: 11px; color: var(--border);
            letter-spacing: 2px; margin-top: 8px;
        }
        .footer-text a { color: var(--gold-dim); text-decoration: none; }

        @media (max-width: 560px) {
            .card-row { flex-direction: column; }
            .panel { padding: 32px 20px; }
            .logo { font-size: 36px; }
            .card { padding: 22px 16px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="panel" id="panel">
        <div class="glint g1" style="top:8%;left:5%;animation-delay:0s;"></div>
        <div class="glint g2" style="top:22%;right:10%;animation-delay:1.5s;"></div>
        <div class="glint g1" style="bottom:40%;left:8%;animation-delay:2s;"></div>
        <div class="glint g2" style="top:70%;right:6%;animation-delay:0.8s;"></div>
        <div class="glint g1" style="bottom:12%;left:15%;animation-delay:2.8s;"></div>

        <div class="header">
            <div class="icon-row">🧐 🔮</div>
            <div class="logo">AMTI</div>
            <div class="logo-sub">Amon · 十八相人格测试</div>
            <div class="desc">
                你体内流淌着哪一只阿蒙的血？<br>
                两种测试方式，两种命运轨迹——选一条路吧。
            </div>
        </div>

        <div class="card-row">
            <a class="card card-gold" href="amti-main.html">
                <div class="card-badge">▎经典版</div>
                <div class="card-icon">🧐</div>
                <div class="card-title">答题测试</div>
                <div class="card-sub">18 道抉择 · 你的选择决定你的面相</div>
                <div class="card-desc">
                    每一道题都有四个选项，<br>
                    你的每一次选择都在暴露——<br>
                    你体内是哪一只阿蒙在低语。
                </div>
            </a>

            <a class="card card-purple" href="amti-fate.html">
                <div class="card-badge">▎天命版</div>
                <div class="card-icon">🔮</div>
                <div class="card-title">天命测试</div>
                <div class="card-sub">18 道天意 · 你的命运已被星盘写定</div>
                <div class="card-desc">
                    所有选项完全一样——<br>
                    你选的不是答案，是时机。<br>
                    让命运替你决定你是谁。
                </div>
            </a>
        </div>

        <div class="footer-text">
            献给诡秘之主 · Memories老师 · 👁 已接待 <span id="busuanzi_value_page_pv">---</span> 次窥视
        </div>
    </div>
</div>
</body>
</html>
